# ~/.config/starship.toml — symlinked from ~/dotfiles/starship.toml
# Minimal, macOS-restrained prompt. Muted Apple system colors, no powerline, no badges.

add_newline = true
format = "$directory$git_branch$git_status$cmd_duration$character"

[directory]
style = "#0a84ff"          # system blue, understated
truncation_length = 3
truncate_to_repo = true
read_only = " 󰌾"
format = "[$path]($style)[$read_only](#8e8e93) "

[git_branch]
symbol = ""
style = "#8e8e93"          # system gray
format = "[$branch]($style) "

[git_status]
style = "#8e8e93"
conflicted = "!"
untracked = "?"
modified = "*"
staged = "+"
renamed = "»"
deleted = "x"
ahead = "↑"
behind = "↓"
stashed = "≡"
format = "([$all_status$ahead_behind]($style) )"

[cmd_duration]
min_time = 2000
style = "#636366"
format = "[$duration]($style) "

[character]
success_symbol = "[❯](#0a84ff)"
error_symbol = "[❯](#ff453a)"
vicmd_symbol = "[❮](#30d158)"
