# ~/.config/starship.toml ŌĆö symlinked from ~/dotfiles/starship.toml
# Native macOS restraint: monochrome. White/gray text, no accent color.
# Only red appears, and only when the last command failed.

add_newline = true
format = "$directory$git_branch$git_status$cmd_duration$character"

[directory]
style = "#e8e8ed"          # soft white ŌĆö like native macOS text
truncation_length = 3
truncate_to_repo = true
read_only = " ¾░īŠ"
format = "[$path]($style)[$read_only](#8e8e93) "

[git_branch]
symbol = ""
style = "#8e8e93"          # system gray, understated
format = "[$branch]($style) "

[git_status]
style = "#8e8e93"
conflicted = "!"
untracked = "?"
modified = "*"
staged = "+"
renamed = "┬╗"
deleted = "x"
ahead = "Ōåæ"
behind = "Ōåō"
stashed = "ŌēĪ"
format = "([$all_status$ahead_behind]($style) )"

[cmd_duration]
min_time = 2000
style = "#636366"
format = "[$duration]($style) "

[character]
success_symbol = "[ŌØ»](#e8e8ed)"   # white
error_symbol = "[ŌØ»](#ff453a)"     # red only on failure
vicmd_symbol = "[ŌØ«](#8e8e93)"
