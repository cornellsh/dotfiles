# Managed by dotfiles. SSH connection multiplexing for the tailnet Mac so that
# repeated ssh/scp calls (notably clip-send's image push + tmux inject) reuse a
# single authenticated master connection instead of re-handshaking each time —
# makes the paste hotkey feel instant.
Host cornell-mac-studio cornell-mac-studio.* 100.107.166.54
  ControlMaster auto
  ControlPath ~/.ssh/sockets/%C
  ControlPersist 10m
  ServerAliveInterval 30
  ServerAliveCountMax 3
